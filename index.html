<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago Semanal de Personal</title>
<style>
    body { font-family: Arial; margin: 20px; }
    h2 { margin-top: 30px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    table, th, td { border: 1px solid #888; padding: 8px; text-align: left; }
    input, select { padding: 5px; margin: 5px; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    .total-row { font-weight: bold; background: #f0f0f0; }
    button { cursor: pointer; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body>

<h1>Aplicación de Pago Semanal</h1>

<!-- CATEGORÍAS -->
<div class="box">
    <h2>1. Categorías y Valor por Hora</h2>
    <input id="categoria" placeholder="Categoría">
    <input id="valorHora" type="number" placeholder="Valor por hora">
    <button onclick="agregarCategoria()">Agregar Categoría</button>

    <table id="tablaCategorias">
        <tr>
            <th>Categoría</th>
            <th>Valor por hora</th>
            <th>Acciones</th>
        </tr>
    </table>
</div>

<!-- EMPLEADOS -->
<div class="box">
    <h2>2. Cargar Personal</h2>
    <input id="nombre" placeholder="Nombre del empleado">
    <select id="categoriaEmpleado"></select>
    <input id="horas" type="number" placeholder="Horas trabajadas">
    <input id="anticipo" type="number" placeholder="Anticipo (opcional)">
    <button onclick="agregarEmpleado()">Agregar Empleado</button>

    <table id="tablaEmpleados">
        <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Valor Hora</th>
            <th>Horas</th>
            <th>Anticipo</th>
            <th>Total</th>
            <th>Acciones</th>
        </tr>
        <tr id="filaTotal" class="total-row">
            <td colspan="6">TOTAL GENERAL</td>
            <td id="totalGeneral">$0</td>
        </tr>
    </table>
</div>

<!-- FECHA -->
<div class="box">
    <h2>3. Fecha de Pago</h2>
    <input id="fechaPago" type="date" onchange="mostrarFecha(); guardarTodo();">
    <p><b>Fecha seleccionada:</b> <span id="fechaMostrada"></span></p>
</div>

<button onclick="exportarPDF()">Exportar PDF</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<script>
// =========================
// ESTADO
// =========================
let categorias = {};
let empleados  = [];

// =========================
// LOCALSTORAGE
// =========================
function guardarTodo() {
    localStorage.setItem("categorias", JSON.stringify(categorias));
    localStorage.setItem("empleados", JSON.stringify(empleados));
    localStorage.setItem("fechaPago", document.getElementById("fechaPago").value);
}

function cargarTodo() {
    const catLS = localStorage.getItem("categorias");
    const empLS = localStorage.getItem("empleados");
    const fechaLS = localStorage.getItem("fechaPago");

    if (catLS) categorias = JSON.parse(catLS);
    if (empLS) empleados = JSON.parse(empLS);
    if (fechaLS) document.getElementById("fechaPago").value = fechaLS;
}

// =========================
// FORMATO
// =========================
function formatoNumero(n) {
    return n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatoFechaDMA(f) {
    if (!f) return "";
    const p = f.split("-");
    return `${p[2]}/${p[1]}/${p[0]}`;
}

function mostrarFecha() {
    const fechaISO = document.getElementById("fechaPago").value;
    document.getElementById("fechaMostrada").textContent = formatoFechaDMA(fechaISO);
}

// =========================
// CATEGORÍAS
// =========================
function actualizarSelectCategorias() {
    const sel = document.getElementById("categoriaEmpleado");
    sel.innerHTML = "";
    for (let c in categorias) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
    }
}

function cargarCategoriasTabla() {
    const tabla = document.getElementById("tablaCategorias");
    tabla.innerHTML = `
        <tr>
            <th>Categoría</th>
            <th>Valor por hora</th>
            <th>Acciones</th>
        </tr>
    `;

    for (let c in categorias) {
        let fila = tabla.insertRow();
        fila.insertCell().textContent = c;
        fila.insertCell().textContent = "$" + formatoNumero(categorias[c]);
        let acciones = fila.insertCell();
        acciones.innerHTML = `
            <button onclick="editarValorHora('${c}')">✏️</button>
            <button onclick="borrarCategoria('${c}')">❌</button>
        `;
    }
}

function agregarCategoria() {
    const cat = document.getElementById("categoria").value.trim();
    const val = parseFloat(document.getElementById("valorHora").value);

    if (!cat || isNaN(val)) {
        alert("Complete categoría y valor");
        return;
    }

    categorias[cat] = val;
    cargarCategoriasTabla();
    actualizarSelectCategorias();
    guardarTodo();

    document.getElementById("categoria").value = "";
    document.getElementById("valorHora").value = "";
}

function borrarCategoria(cat) {
    delete categorias[cat];
    empleados = empleados.filter(e => e.categoria !== cat);
    cargarCategoriasTabla();
    actualizarSelectCategorias();
    cargarEmpleadosTabla();
    guardarTodo();
}

function editarValorHora(cat) {
    let nuevo = prompt("Nuevo valor por hora:", categorias[cat]);
    if (nuevo === null) return;
    nuevo = parseFloat(nuevo);
    if (isNaN(nuevo)) {
        alert("Valor inválido");
        return;
    }

    categorias[cat] = nuevo;

    empleados.forEach(e => {
        if (e.categoria
